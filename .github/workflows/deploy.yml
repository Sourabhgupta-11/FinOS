name: Deploy Financial OS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: production
        type: choice
        options: [staging, production]

env:
  AWS_REGION: us-east-1
  PROJECT: financialos
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: financialos_test
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        run: cd backend && npm ci

      - name: Run backend tests
        run: cd backend && npm test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:testpassword@localhost:5432/financialos_test
          JWT_SECRET: test-secret-min-32-chars-long-here
          GROQ_API_KEY: test-key

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build
        env:
          VITE_API_URL: /api

  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push backend
        run: |
          docker build --platform linux/amd64 \
            -t $ECR_REGISTRY/$PROJECT/backend:${{ github.sha }} \
            -t $ECR_REGISTRY/$PROJECT/backend:latest \
            ./backend
          docker push $ECR_REGISTRY/$PROJECT/backend:${{ github.sha }}
          docker push $ECR_REGISTRY/$PROJECT/backend:latest

      - name: Build & push frontend
        run: |
          docker build --platform linux/amd64 \
            --build-arg VITE_API_URL=/api \
            -t $ECR_REGISTRY/$PROJECT/frontend:${{ github.sha }} \
            -t $ECR_REGISTRY/$PROJECT/frontend:latest \
            ./frontend
          docker push $ECR_REGISTRY/$PROJECT/frontend:${{ github.sha }}
          docker push $ECR_REGISTRY/$PROJECT/frontend:latest

      - name: Deploy backend to ECS
        run: |
          aws ecs update-service \
            --cluster $PROJECT-cluster \
            --service $PROJECT-backend \
            --force-new-deployment \
            --region $AWS_REGION

      - name: Deploy frontend to ECS
        run: |
          aws ecs update-service \
            --cluster $PROJECT-cluster \
            --service $PROJECT-frontend \
            --force-new-deployment \
            --region $AWS_REGION

      - name: Wait for services to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster $PROJECT-cluster \
            --services $PROJECT-backend $PROJECT-frontend \
            --region $AWS_REGION
        timeout-minutes: 10

      - name: Notify success
        run: |
          echo "✅ Deployment complete!"
          echo "SHA: ${{ github.sha }}"
          echo "Deployed by: ${{ github.actor }}"
